<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WHOOP Callback Bridge</title>
    <style>
      :root {
        --bg: #09131c;
        --panel: #10202d;
        --line: rgba(161, 185, 198, 0.18);
        --text: #eff6fb;
        --muted: #97afbd;
        --accent: #62e9bf;
        --warn: #ffd27b;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(98, 233, 191, 0.16), transparent 30%),
          linear-gradient(180deg, #09131c 0%, #0d1d2a 100%);
        color: var(--text);
      }

      .card {
        width: min(720px, 100%);
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(16, 32, 45, 0.92);
        padding: 28px;
        box-shadow: 0 32px 90px rgba(0, 0, 0, 0.32);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 4vw, 3rem);
      }

      p {
        color: var(--muted);
        line-height: 1.7;
        font-size: 18px;
      }

      .url {
        display: inline-block;
        margin-top: 12px;
        color: var(--accent);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
      }

      .warn {
        color: var(--warn);
      }

      a.button {
        display: inline-block;
        margin-top: 18px;
        padding: 12px 18px;
        border-radius: 999px;
        border: 1px solid rgba(98, 233, 191, 0.4);
        color: var(--text);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Forwarding WHOOP authorization…</h1>
      <p id="message">
        This page is redirecting the WHOOP OAuth result to your local development server.
      </p>
      <p>
        Expected local callback:
        <span class="url" id="target-url">http://localhost:8000/auth/callback</span>
      </p>
      <a class="button" id="manual-link" href="#">Open local callback manually</a>
    </section>

    <script>
      (function () {
        var localTarget = "http://localhost:8000/auth/callback";
        var query = window.location.search || "";
        var target = localTarget + query;
        var message = document.getElementById("message");
        var targetLabel = document.getElementById("target-url");
        var manualLink = document.getElementById("manual-link");

        targetLabel.textContent = target;
        manualLink.href = target;

        if (!query) {
          message.innerHTML = "This callback page is configured, but there are no WHOOP OAuth parameters in the URL yet.";
          return;
        }

        message.innerHTML = "If your local backend is running, you should be redirected automatically in a moment. <span class=\"warn\">If nothing happens, use the button below.</span>";

        window.setTimeout(function () {
          window.location.href = target;
        }, 1200);
      })();
    </script>
  </body>
</html>
